# ============================================
# NOVAPULSE - CONTINUOUS DEPLOYMENT (CD)
# ============================================
# Runs ONLY when code is pushed/merged to main
# Builds Docker images and pushes to GitHub Container Registry (GHCR)
#
# WHY CD?
# - Automatically builds production-ready Docker images
# - Pushes to a registry so any server can pull and deploy
# - Tags images with commit SHA for traceability
# - Zero manual steps = fewer human errors
#
# WHAT IS GHCR?
# - GitHub Container Registry - free Docker image hosting
# - Your images live at: ghcr.io/gitmuhammadali/nova-plus
# - Private by default, tied to your GitHub account
# ============================================

name: CD Pipeline

on:
  push:
    branches: [main]
    # Only run CD when actual code changes (not just docs)
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/workflows/security.yml'

# Permissions needed to push to GHCR
permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel deployments!

jobs:

  # ------------------------------------------
  # JOB 1: Build & Push Backend Docker Image
  # ------------------------------------------
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Login to GitHub Container Registry
      # Uses the built-in GITHUB_TOKEN (no setup needed!)
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Buildx enables advanced build features:
      # - Multi-platform builds (amd64, arm64)
      # - Build caching (faster rebuilds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Extract metadata for tagging
      # Creates tags like:
      #   ghcr.io/gitmuhammadali/nova-plus/backend:main
      #   ghcr.io/gitmuhammadali/nova-plus/backend:sha-abc123
      #   ghcr.io/gitmuhammadali/nova-plus/backend:latest
      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # Build and push the image
      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GHCR for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------
  # JOB 2: Build & Push Frontend Docker Image
  # ------------------------------------------
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Pass build args for the frontend
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.API_URL || 'https://api.novapulse.com' }}

  # ------------------------------------------
  # JOB 3: Build & Push Worker Docker Image
  # ------------------------------------------
  build-worker:
    name: Build & Push Worker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/worker
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------
  # JOB 4: Deploy to Staging
  # ------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, build-worker]
    environment:
      name: staging
      url: https://staging.novapulse.com

    steps:
      - uses: actions/checkout@v4

      # Option A: Deploy via SSH to a VPS (DigitalOcean, AWS EC2, etc.)
      # Uncomment and configure when you have a server
      #
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.STAGING_HOST }}
      #     username: ${{ secrets.STAGING_USER }}
      #     key: ${{ secrets.STAGING_SSH_KEY }}
      #     script: |
      #       cd /opt/novapulse
      #       docker compose pull
      #       docker compose up -d --remove-orphans
      #       docker system prune -f

      # Option B: Deploy to Railway/Render/Fly.io
      # These platforms auto-deploy from Docker images

      - name: Deployment Placeholder
        run: |
          echo "============================================"
          echo "  STAGING DEPLOYMENT"
          echo "============================================"
          echo "Images pushed to GHCR:"
          echo "  - ghcr.io/${{ github.repository }}/backend:latest"
          echo "  - ghcr.io/${{ github.repository }}/frontend:latest"
          echo "  - ghcr.io/${{ github.repository }}/worker:latest"
          echo ""
          echo "To deploy to a VPS:"
          echo "  1. SSH into your server"
          echo "  2. docker compose pull"
          echo "  3. docker compose up -d"
          echo "============================================"

  # ------------------------------------------
  # JOB 5: Deploy to Production (manual approval)
  # ------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    # IMPORTANT: This requires manual approval in GitHub
    # Go to Settings > Environments > production > Add reviewers
    environment:
      name: production
      url: https://novapulse.com

    steps:
      - uses: actions/checkout@v4

      - name: Deployment Placeholder
        run: |
          echo "============================================"
          echo "  PRODUCTION DEPLOYMENT"
          echo "============================================"
          echo "Deploying commit: ${{ github.sha }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "============================================"
