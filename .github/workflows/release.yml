# ============================================
# NOVAPULSE - RELEASE MANAGEMENT
# ============================================
# Creates GitHub Releases with changelogs when you push a tag
#
# HOW TO CREATE A RELEASE:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# This will:
# 1. Build and push Docker images tagged with the version
# 2. Create a GitHub Release with auto-generated changelog
# 3. Tag Docker images as both v1.0.0 and latest
#
# SEMVER (Semantic Versioning):
#   v1.0.0 = MAJOR.MINOR.PATCH
#   MAJOR: Breaking changes (v1 -> v2)
#   MINOR: New features, backwards compatible (v1.0 -> v1.1)
#   PATCH: Bug fixes (v1.0.0 -> v1.0.1)
# ============================================

name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Matches v1.0.0, v2.1.3, etc.

permissions:
  contents: write   # Create releases
  packages: write   # Push Docker images

jobs:

  # ------------------------------------------
  # JOB 1: Build Release Images
  # ------------------------------------------
  release-images:
    name: Build Release Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - service: frontend
            context: ./Frontend
            dockerfile: ./Frontend/Dockerfile
          - service: worker
            context: ./backend
            dockerfile: ./backend/Dockerfile.worker

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # For releases, tag with the version number
      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------
  # JOB 2: Create GitHub Release
  # ------------------------------------------
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release-images]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      # Auto-generate changelog from commits since last tag
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            ```bash
            # Pull the release images
            docker pull ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}
            docker pull ghcr.io/${{ github.repository }}/frontend:${{ github.ref_name }}
            docker pull ghcr.io/${{ github.repository }}/worker:${{ github.ref_name }}
            ```

            ## Quick Deploy

            ```bash
            # On your server
            export VERSION=${{ github.ref_name }}
            docker compose pull
            docker compose up -d
            ```
